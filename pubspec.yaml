name: security_inventory
description: Multi-store inventory management for a CCTV, security & networking shop.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  firebase_storage: ^12.3.4

  # State management & routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # UI / UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  badges: ^3.1.2
  flutter_slidable: ^3.1.1
  cached_network_image: ^3.4.1
  lottie: ^3.1.3

  # Utilities
  intl: ^0.19.0
  collection: ^1.18.0
  uuid: ^4.4.2
  url_launcher: ^6.3.0
  mobile_scanner: ^5.2.3
  image_picker: ^1.1.2
  connectivity_plus: ^6.0.5
  flutter_local_notifications: ^17.2.3
  shared_preferences: ^2.3.2
  responsive_framework: ^1.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # assets:
  #   - assets/images/
  #   - assets/icons/
